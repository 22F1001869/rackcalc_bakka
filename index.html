<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1f3f39" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Bakka" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <title>Bakka Enterprises • Quote Studio Teal</title>
  <style>
    :root{
      --bg:#eef5f3; --paper:#fafdfc; --sheet:#ffffff; --ink:#18312c; --muted:#5b736d; --line:rgba(24,49,44,.10);
      --brand:#18312c; --brand-2:#40786C; --brand-3:#d6e9e4; --ok:#0f766e; --danger:#c2410c; --focus:rgba(64,120,108,.20);
      --shadow:0 10px 30px rgba(24,49,44,.08);
    }
    body.dark{
      --bg:#0f1816; --paper:#121f1c; --sheet:#172623; --ink:#eef6f4; --muted:#a5c1ba; --line:rgba(255,255,255,.08);
      --brand:#0d1412; --brand-2:#5da394; --brand-3:#1f3d37; --focus:rgba(93,163,148,.22); --shadow:0 12px 34px rgba(0,0,0,.35);
    }
    *{box-sizing:border-box} html{-webkit-text-size-adjust:100%}
    body{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(circle at top left, rgba(64,120,108,.10), transparent 24%),radial-gradient(circle at bottom right, rgba(24,49,44,.06), transparent 26%),var(--bg);color:var(--ink);min-height:100vh;padding-bottom:calc(90px + env(safe-area-inset-bottom))}
    .app{max-width:1200px;margin:0 auto;padding:10px 12px 20px}
    .topbar{position:sticky;top:0;z-index:50;margin:0 -12px 12px;padding:calc(10px + env(safe-area-inset-top)) 12px 10px;background:rgba(238,245,243,.88);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
    body.dark .topbar{background:rgba(15,24,22,.90)}
    .top-grid{display:flex;align-items:center;justify-content:space-between;gap:10px}.title-wrap{min-width:0}
    .eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:.18em;font-weight:900;color:var(--brand-2)}
    .title{margin:2px 0 0;font-size:22px;line-height:1.05;font-weight:900}.subtitle{margin-top:4px;font-size:12px;color:var(--muted)}
    .icon-row{display:flex;gap:8px}.icon-btn{width:42px;height:42px;border-radius:14px;border:1px solid var(--line);background:var(--sheet);color:var(--ink);display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow)}
    .summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:10px;max-height:160px;opacity:1;overflow:hidden;transition:max-height .22s ease,opacity .18s ease,margin .18s ease,transform .18s ease}.summary-bar.hidden{max-height:0;opacity:0;margin-top:0;transform:translateY(-8px);pointer-events:none}
    .sum-chip{background:var(--sheet);border:1px solid var(--line);border-radius:16px;padding:10px 12px;box-shadow:var(--shadow)}.sum-chip .k{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--muted);font-weight:800}.sum-chip .v{margin-top:4px;font-size:16px;font-weight:900}
    .workspace{display:grid;grid-template-columns:1.02fr .98fr;gap:12px;align-items:start}
    .panel{background:var(--sheet);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);overflow:hidden}.left-pad,.right-pad{padding:12px}
